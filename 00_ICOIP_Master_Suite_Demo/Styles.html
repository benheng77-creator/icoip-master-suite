<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    --font: 'Inter', system-ui, -apple-system, sans-serif;
    --bg: #f4f7fb;
    --card: #ffffff;
    --line: #d8e0ea;
    --line-soft: #edf2f7;
    --text: #17212f;
    --muted: #617187;
    --primary: #1f4fd4;
    --primary-soft: #e9f0ff;
    --secondary: #0f766e;
    --secondary-soft: #e6fffb;
    --warning: #b54708;
    --warning-soft: #fff3dd;
    --danger: #b42318;
    --danger-soft: #feeceb;
    --shadow-modal: 0 20px 40px rgba(15, 23, 42, .14);
    --radius-input: 10px;
    --radius-btn: 10px;
    --radius-card: 16px;
    --radius-modal: 18px;
    --radius-chip: 999px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: var(--font); background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }
  body { min-height: 100vh; }
  a { color: var(--primary); }
  .hidden { display: none !important; }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

  *:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 4px; }

  .page-shell { max-width: 1440px; margin: 0 auto; padding: 22px; }

  .surface, .stat-card, .profile-card, .table-card, .module-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-card); }
  .modal-panel { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-modal); box-shadow: var(--shadow-modal); }

  .hero { padding: 24px; display: grid; grid-template-columns: 1.7fr .9fr; gap: 20px; align-items: start; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-card); }
  .hero-side { display: flex; justify-content: flex-end; }
  .profile-card { padding: 18px; }
  .profile-top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
  .profile-name { font-size: 20px; font-weight: 800; }
  .profile-meta { color: var(--muted); margin-top: 4px; font-size: 14px; }
  .chip-wrap { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .chip { display: inline-flex; align-items: center; padding: 5px 10px; border-radius: var(--radius-chip); font-size: 12px; font-weight: 600; background: var(--primary-soft); color: var(--primary); }
  .chip.secondary { background: var(--secondary-soft); color: #0a5450; }
  .chip.warn { background: var(--warning-soft); color: #8c3900; }

  .eyebrow { margin: 0 0 8px; text-transform: uppercase; letter-spacing: .08em; font-size: 12px; color: var(--primary); font-weight: 700; }
  h1, h2, h3 { margin: 0; font-family: var(--font); }
  h1 { font-size: 32px; line-height: 1.15; margin-bottom: 6px; font-weight: 800; }
  h2 { font-size: 22px; font-weight: 700; }
  h3 { font-size: 17px; font-weight: 700; }
  .hero-subtitle, .programme-description, .muted { color: var(--muted); }
  .programme-description { margin-top: 12px; line-height: 1.6; font-size: 14px; }
  .tiny { font-size: 12px; }

  /* Module grid */
  .module-surface { margin-top: 18px; padding: 18px; }
  .module-head { margin-bottom: 16px; }
  .module-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .module-card { padding: 18px; cursor: pointer; transition: transform .15s, border-color .15s; }
  .module-card:hover { transform: translateY(-1px); border-color: var(--primary); }
  .module-card.active { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(31,79,212,.12); }
  .module-card-top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
  .module-icon { font-size: 22px; line-height: 1; }
  .module-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  .module-subtitle { font-size: 13px; color: var(--muted); min-height: 36px; }
  .module-stat { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--line-soft); }
  .module-stat-value { font-size: 22px; font-weight: 800; }
  .module-banner { margin-top: 18px; padding: 18px; display: grid; grid-template-columns: 1.4fr .8fr; gap: 16px; align-items: center; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-card); }
  .module-meta-card { padding: 16px; border: 1px solid var(--line-soft); border-radius: 12px; background: #fff; display: grid; gap: 10px; }
  .module-meta-line { display: flex; justify-content: space-between; gap: 10px; }
  .module-meta-key { color: var(--muted); font-size: 13px; }
  .module-meta-value { font-weight: 700; text-align: right; font-size: 14px; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 18px; }
  .stat-card { padding: 20px; cursor: default; }
  .stat-label { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .stat-value { font-size: 32px; font-weight: 800; }

  .two-col { display: grid; grid-template-columns: minmax(0, 1.65fr) minmax(340px, .95fr); gap: 18px; margin-top: 18px; }
  .stack { display: grid; gap: 18px; }
  .surface { padding: 18px; }
  .surface.tone { background: #fbfdff; }
  .section-head { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 14px; }
  .section-head.compact { margin-bottom: 10px; }
  .toolbar { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 14px; }
  .toolbar-left, .toolbar-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .table-card { padding: 6px; }
  .table-wrap { overflow: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 680px; }
  th, td { padding: 13px 12px; border-bottom: 1px solid var(--line-soft); text-align: left; vertical-align: middle; font-size: 14px; }
  th { background: #f8fbff; position: sticky; top: 0; z-index: 1; font-weight: 600; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  tr:last-child td { border-bottom: 0; }
  tr:hover td { background: #fafcff; }
  tr.row-saved td { animation: rowHighlight 2s ease forwards; }
  @keyframes rowHighlight { 0% { background: var(--primary-soft); } 100% { background: transparent; } }

  .badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: var(--radius-chip); font-size: 12px; font-weight: 700; background: var(--primary-soft); color: var(--primary); white-space: nowrap; }
  .badge.warn { background: var(--warning-soft); color: #8c3900; }
  .badge.warn::before { content: '⏳\00a0'; }
  .badge.secondary { background: var(--secondary-soft); color: #0a5450; }
  .badge.secondary::before { content: '✓\00a0'; }
  .badge.danger { background: var(--danger-soft); color: #921a12; }
  .badge.danger::before { content: '✕\00a0'; }

  .actions, .action-grid { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { appearance: none; border: 0; border-radius: var(--radius-btn); padding: 10px 16px; font-weight: 600; font-family: var(--font); cursor: pointer; font-size: 14px; min-height: 44px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: background .15s, opacity .15s; white-space: nowrap; }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #1a42b0; }
  .btn-secondary { background: #dae6ff; color: var(--text); }
  .btn-secondary:hover:not(:disabled) { background: #c8d9ff; }
  .btn-ghost { background: #fff; border: 1px solid var(--line); color: var(--text); }
  .btn-ghost:hover:not(:disabled) { background: var(--bg); }
  .btn-danger { background: #fff; border: 1px solid #f0b5b2; color: #921a12; }
  .btn-danger:hover:not(:disabled) { background: var(--danger-soft); }
  .btn-sm { padding: 8px 14px; font-size: 13px; min-height: 40px; }

  .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .form-field.full { grid-column: 1 / -1; }
  .form-field label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 7px; }
  .field-error { display: block; font-size: 12px; color: #921a12; margin-top: 5px; font-weight: 500; }
  input, select, textarea { width: 100%; padding: 12px 14px; border: 1px solid var(--line); border-radius: var(--radius-input); font-size: 15px; font-family: var(--font); background: #fff; color: var(--text); transition: border-color .15s; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); }
  input.field-invalid, select.field-invalid, textarea.field-invalid { border-color: #921a12; }
  textarea { min-height: 110px; resize: vertical; }

  .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, .5); display: flex; align-items: center; justify-content: center; padding: 18px; z-index: 50; -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px); }
  .modal-panel { width: min(820px, 100%); padding: 26px; max-height: 92vh; overflow: auto; }
  .slim-panel { width: min(640px, 100%); }
  .login-panel { width: min(920px, 100%); }
  .confirm-modal { width: min(460px, 100%); }
  .confirm-modal p { color: var(--muted); margin-top: 8px; font-size: 14px; line-height: 1.6; }
  .modal-header { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 20px; }
  .icon-btn { appearance: none; border: 1px solid var(--line); background: #fff; border-radius: 10px; width: 44px; height: 44px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--muted); font-family: var(--font); }
  .icon-btn:hover { background: var(--bg); color: var(--text); }
  .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 22px; flex-wrap: wrap; }
  .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

  .timeline { display: grid; gap: 10px; }
  .timeline-item { padding: 12px 14px; border: 1px solid var(--line-soft); border-radius: 12px; background: #fbfdff; }
  .timeline-title { font-weight: 600; margin-bottom: 4px; font-size: 14px; }
  .timeline-meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 14px; }
  .summary-card { padding: 12px; border: 1px solid var(--line-soft); border-radius: 12px; background: #fff; }
  .summary-label { font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  .summary-value { font-weight: 700; font-size: 14px; }
  .mini-list { display: grid; gap: 10px; }
  .mini-item { padding: 12px; border: 1px solid var(--line-soft); border-radius: 12px; background: #fff; }

  .demo-user-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-top: 16px; }
  .login-instruction { font-size: 14px; color: var(--muted); margin-top: 14px; }
  .user-card { padding: 18px; border: 2px solid var(--line); border-radius: var(--radius-card); background: #fff; cursor: pointer; text-align: left; width: 100%; transition: border-color .15s, transform .1s; font-family: var(--font); }
  .user-card:hover { border-color: var(--primary); transform: translateY(-1px); }
  .user-card-role { font-size: 12px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .user-card-title { font-size: 18px; font-weight: 800; margin-bottom: 2px; }
  .user-card-meta { color: var(--muted); font-size: 13px; }

  .permission-section { margin-top: 10px; }
  .workflow-note { margin-top: 12px; }

  .skeleton-table { padding: 6px; }
  .skeleton-row { height: 50px; margin-bottom: 2px; background: #e8edf5; border-radius: 6px; overflow: hidden; position: relative; }
  .skeleton-row:first-child { height: 42px; background: #f0f4fa; border-radius: 6px 6px 0 0; }
  .skeleton-row::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.6) 50%, transparent 100%); transform: translateX(-100%); will-change: transform; animation: shimmer 1.6s infinite; }
  .skeleton-row:first-child::after { display: none; }
  @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

  #toastContainer { position: fixed; right: 20px; bottom: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; max-width: 380px; pointer-events: none; }
  .toast-item { padding: 13px 16px; border-radius: 12px; background: #1e293b; color: #fff; font-size: 14px; font-family: var(--font); line-height: 1.4; box-shadow: 0 8px 24px rgba(0,0,0,.18); opacity: 1; transition: opacity .3s ease; pointer-events: auto; }
  .toast-item.toast-error { background: #7f1d1d; border-left: 3px solid #f87171; }
  .toast-item.toast-success { background: #14532d; border-left: 3px solid #4ade80; }
  .toast-item.toast-fade { opacity: 0; }

  @media (max-width: 1180px) {
    .hero, .module-banner { grid-template-columns: 1fr; }
    .hero-side { justify-content: flex-start; }
    .two-col { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .detail-grid { grid-template-columns: 1fr; }
    .module-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 720px) {
    .page-shell { padding: 12px; }
    h1 { font-size: 26px; }
    .stats-grid, .demo-user-grid, .summary-grid, .form-grid, .module-grid { grid-template-columns: 1fr; }
    .toolbar, .section-head, .profile-top, .module-head { flex-direction: column; align-items: stretch; }
    .btn { width: 100%; }
    .modal { padding: 10px; }
    .modal-panel { padding: 18px; border-radius: 14px; }
    table { min-width: 400px; }
    th, td { padding: 10px 8px; }
    #toastContainer { left: 12px; right: 12px; bottom: 14px; max-width: none; }
    .toast-item { width: 100%; }
  }
</style>
