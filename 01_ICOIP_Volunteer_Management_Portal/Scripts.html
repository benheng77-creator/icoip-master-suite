<script>
  // ============================================================
  // ICOIP PORTAL V2 — Scripts.html (portals 01-05)
  // ============================================================

  const state = {
    config: window.APP_CONFIG,
    currentUser: null,
    permissions: [],
    records: [],
    stats: {},
    selectedRecordId: '',
    selectedBundle: null
  };

  const _modalStack = [];
  let _confirmAction = null;

  document.addEventListener('DOMContentLoaded', initApp);

  function initApp() {
    document.getElementById('pageTitle').textContent = state.config.pageTitle;
    document.getElementById('pageSubtitle').textContent = state.config.pageSubtitle;
    renderDemoUsers();
    renderTableHead();
    buildForm();
    populateAttachmentCategories();
    try {
      const saved = sessionStorage.getItem('icoip_user_' + state.config.pageTitle);
      if (saved) { selectUser(JSON.parse(saved)); return; }
    } catch (e) {}
  }

  // --- Demo Users ---
  function renderDemoUsers() {
    const wrap = document.getElementById('demoUserGrid');
    wrap.innerHTML = '';
    (state.config.demoUsers || []).forEach((user) => {
      const card = document.createElement('button');
      card.type = 'button';
      card.className = 'user-card';
      card.setAttribute('aria-label', 'Sign in as ' + user.role + ': ' + user.fullName);
      card.innerHTML =
        '<div class="user-card-role">' + escapeHtml(user.role) + '</div>' +
        '<div class="user-card-title">' + escapeHtml(user.fullName) + '</div>' +
        '<div class="user-card-meta">' + escapeHtml(user.department || '') + '</div>';
      card.addEventListener('click', () => selectUser(user));
      wrap.appendChild(card);
    });
  }

  function selectUser(user) {
    state.currentUser = { email: user.email, fullName: user.fullName, role: user.role, department: user.department || '' };
    try { sessionStorage.setItem('icoip_user_' + state.config.pageTitle, JSON.stringify(user)); } catch (e) {}
    document.getElementById('loginModal').classList.add('hidden');
    document.getElementById('appShell').classList.remove('hidden');
    showSkeleton();
    loadAppState();
  }

  function openUserSwitcher() {
    document.getElementById('loginModal').classList.remove('hidden');
  }

  // --- Data Loading ---
  function loadAppState(searchTerm, highlightId) {
    searchTerm = searchTerm || '';
    highlightId = highlightId || '';
    showSkeleton();
    google.script.run
      .withSuccessHandler(function(response) {
        hideSkeleton();
        state.permissions = response.permissions || [];
        state.records = response.records || [];
        state.stats = response.stats || {};
        state.currentUser = response.currentUser || state.currentUser;
        renderCurrentUser();
        renderStats();
        renderTable(highlightId);
        renderActivity(response.recentActivity || []);
        renderNotifications(response.notifications || []);
        applyPermissionVisibility();
        announce(state.records.length + ' record' + (state.records.length === 1 ? '' : 's') + ' loaded');
      })
      .withFailureHandler(function(err) {
        hideSkeleton();
        showError(err);
      })
      .getAppState(state.currentUser, searchTerm);
  }

  function showSkeleton() {
    document.getElementById('tableSkeleton').classList.remove('hidden');
    document.getElementById('tableCard').classList.add('hidden');
  }

  function hideSkeleton() {
    document.getElementById('tableSkeleton').classList.add('hidden');
    document.getElementById('tableCard').classList.remove('hidden');
  }

  // --- Render User / Stats ---
  function renderCurrentUser() {
    document.getElementById('currentUserName').textContent = state.currentUser.fullName || '';
    document.getElementById('currentUserMeta').textContent = (state.currentUser.role || '') + ' · ' + (state.currentUser.email || '');
    document.getElementById('permissionChips').innerHTML = state.permissions.map(function(p) {
      return '<span class="chip">' + escapeHtml(p) + '</span>';
    }).join('');
  }

  function renderStats() {
    const grid = document.getElementById('statsGrid');
    grid.innerHTML = '';
    (state.config.dashboardMetrics || []).forEach(function(metric) {
      const card = document.createElement('div');
      card.className = 'stat-card';
      const value = state.stats[metric.id] == null ? 0 : state.stats[metric.id];
      card.setAttribute('aria-label', metric.label + ': ' + value);
      card.innerHTML = '<div class="stat-label">' + escapeHtml(metric.label) + '</div><div class="stat-value">' + escapeHtml(String(value)) + '</div>';
      grid.appendChild(card);
    });
  }

  // --- Render Activity / Notifications ---
  function renderActivity(items) {
    const wrap = document.getElementById('activityFeed');
    if (!items.length) { wrap.innerHTML = renderEmptyState('No recent activity.', ''); return; }
    wrap.innerHTML = '';
    items.forEach(function(item) {
      const el = document.createElement('div');
      el.className = 'timeline-item';
      el.innerHTML =
        '<div class="timeline-title">' + escapeHtml(item.action || '') + '</div>' +
        '<div style="font-size:13px">' + escapeHtml(item.recordId || '') + '</div>' +
        '<div class="timeline-meta">' + escapeHtml(item.fullName || item.email || '') + ' · ' + escapeHtml(item.timestamp || '') + '</div>';
      wrap.appendChild(el);
    });
  }

  function renderNotifications(items) {
    const wrap = document.getElementById('notificationFeed');
    if (!items.length) { wrap.innerHTML = renderEmptyState('No notifications sent yet.', ''); return; }
    wrap.innerHTML = '';
    items.forEach(function(item) {
      const el = document.createElement('div');
      el.className = 'timeline-item';
      el.innerHTML =
        '<div class="timeline-title">' + escapeHtml(item.subject || '') + '</div>' +
        '<div style="font-size:13px">' + escapeHtml(item.to || '') + '</div>' +
        '<div class="timeline-meta">' + escapeHtml(item.deliveryStatus || '') + ' · ' + escapeHtml(item.sentAt || item.triggeredAt || '') + '</div>';
      wrap.appendChild(el);
    });
  }

  // --- Table ---
  function renderTableHead() {
    const head = document.getElementById('tableHead');
    head.innerHTML = '';
    const tr = document.createElement('tr');
    state.config.tableColumns.forEach(function(column) {
      const th = document.createElement('th');
      th.scope = 'col';
      th.textContent = column;
      tr.appendChild(th);
    });
    const actionTh = document.createElement('th');
    actionTh.scope = 'col';
    actionTh.textContent = 'Actions';
    tr.appendChild(actionTh);
    head.appendChild(tr);
  }

  function renderTable(highlightId) {
    highlightId = highlightId || '';
    const body = document.getElementById('tableBody');
    body.innerHTML = '';
    if (!state.records.length) {
      const tr = document.createElement('tr');
      tr.innerHTML = '<td colspan="' + (state.config.tableColumns.length + 1) + '" style="padding:0">' + renderEmptyState('No records yet', 'Add the first record to get started.') + '</td>';
      body.appendChild(tr);
    } else {
      state.records.forEach(function(record) {
        const tr = document.createElement('tr');
        if (highlightId && record['Record ID'] === highlightId) tr.classList.add('row-saved');
        state.config.tableColumns.forEach(function(column) {
          const td = document.createElement('td');
          td.innerHTML = renderValueBadge(column, record[column] == null ? '' : String(record[column]));
          tr.appendChild(td);
        });
        const tdA = document.createElement('td');
        tdA.innerHTML =
          '<div class="actions">' +
          '<button class="btn btn-secondary btn-sm" type="button" onclick="openRecordWorkspace(\'' + escapeAttr(record['Record ID']) + '\')">Open</button>' +
          (can('edit') ? '<button class="btn btn-ghost btn-sm" type="button" onclick="editRecord(\'' + escapeAttr(record['Record ID']) + '\')">Edit</button>' : '') +
          (can('delete') ? '<button class="btn btn-danger btn-sm" type="button" onclick="confirmRemoveRecord(\'' + escapeAttr(record['Record ID']) + '\', this)">Delete</button>' : '') +
          '</div>';
        tr.appendChild(tdA);
        body.appendChild(tr);
      });
    }
    document.getElementById('recordCountLabel').textContent = state.records.length + ' record' + (state.records.length === 1 ? '' : 's');
  }

  function renderEmptyState(title, subtitle) {
    return '<div style="text-align:center;padding:32px 20px;color:var(--muted)">' +
      '<div style="font-size:28px;margin-bottom:10px">📋</div>' +
      '<div style="font-weight:700;color:var(--text);font-size:15px;margin-bottom:4px">' + escapeHtml(title) + '</div>' +
      (subtitle ? '<div style="font-size:13px">' + escapeHtml(subtitle) + '</div>' : '') +
      '</div>';
  }

  // --- Badges ---
  function renderValueBadge(column, value) {
    const badgeCols = ['Status','Priority','Risk Level','Onboarding Status','Eligibility Status','Case Status','Session Status','Follow Up Required','WSQ Alignment','Output Type','Access Level'];
    if (badgeCols.indexOf(column) > -1) {
      let klass = 'badge';
      const low = String(value || '').toLowerCase();
      if (['urgent','critical','high','not eligible','cancelled'].indexOf(low) > -1) klass += ' danger';
      else if (['pending','requested','in review','in progress','ready for review'].indexOf(low) > -1) klass += ' warn';
      else if (['completed','assigned','eligible','active','yes'].indexOf(low) > -1) klass += ' secondary';
      return '<span class="' + klass + '">' + escapeHtml(value || '-') + '</span>';
    }
    return escapeHtml(value || '-');
  }

  // --- Form Builder ---
  function buildForm() {
    const grid = document.getElementById('formGrid');
    grid.innerHTML = '';
    state.config.formFields.forEach(function(field) {
      const wrap = document.createElement('div');
      wrap.className = 'form-field' + (field.input === 'textarea' ? ' full' : '');
      const lbl = document.createElement('label');
      lbl.setAttribute('for', toInputId(field.key));
      lbl.innerHTML = escapeHtml(field.label) + (field.required ? ' <span aria-hidden="true">*</span>' : '');
      wrap.appendChild(lbl);
      let input;
      if (field.input === 'select') {
        input = document.createElement('select');
        input.innerHTML = '<option value="">Select</option>' + (field.options || []).map(function(o) {
          return '<option value="' + escapeAttr(o) + '">' + escapeHtml(o) + '</option>';
        }).join('');
      } else if (field.input === 'textarea') {
        input = document.createElement('textarea');
      } else {
        input = document.createElement('input');
        input.type = field.input || 'text';
      }
      input.id = toInputId(field.key);
      input.name = field.key;
      input.required = !!field.required;
      input.addEventListener('input', function() {
        input.classList.remove('field-invalid');
        const err = wrap.querySelector('.field-error');
        if (err) err.remove();
      });
      wrap.appendChild(input);
      grid.appendChild(wrap);
    });
  }

  function populateAttachmentCategories() {
    const select = document.getElementById('attachmentCategory');
    select.innerHTML = (state.config.attachmentCategories || []).map(function(item) {
      return '<option value="' + escapeAttr(item) + '">' + escapeHtml(item) + '</option>';
    }).join('');
  }

  function can(permission) { return state.permissions.indexOf(permission) > -1; }

  function applyPermissionVisibility() {
    document.getElementById('addBtn').style.display = can('create') ? '' : 'none';
    const resetBtn = document.getElementById('resetBtn');
    if (resetBtn) resetBtn.hidden = !can('reset');
  }

  // --- Search ---
  function performSearch() { loadAppState(document.getElementById('searchInput').value.trim()); }
  function clearSearch() { document.getElementById('searchInput').value = ''; loadAppState(''); }

  // --- Record CRUD ---
  function openRecordModal(record) {
    if (!can('create') && !can('edit')) return showToast('This role cannot create or edit records.', 'error');
    document.getElementById('recordModalTitle').textContent = record ? 'Edit Record' : 'Add Record';
    document.getElementById('recordIdField').value = record ? (record['Record ID'] || '') : '';
    clearFormErrors(document.getElementById('recordForm'));
    state.config.formFields.forEach(function(field) {
      const input = document.getElementById(toInputId(field.key));
      if (input) input.value = record && record[field.key] != null ? record[field.key] : '';
    });
    openModal('recordModal');
  }

  function closeRecordModal() {
    closeModal('recordModal');
    document.getElementById('recordForm').reset();
    document.getElementById('recordIdField').value = '';
    clearFormErrors(document.getElementById('recordForm'));
  }

  function editRecord(recordId) {
    const record = state.records.find(function(r) { return r['Record ID'] === recordId; });
    if (!record) return showToast('Record not found.', 'error');
    openRecordModal(record);
  }

  function submitRecord(event) {
    event.preventDefault();
    const form = document.getElementById('recordForm');
    if (!validateForm(form)) return;
    const btn = document.getElementById('saveRecordBtn');
    const loader = withButtonLoading(btn, 'Saving');
    const savedId = document.getElementById('recordIdField').value;
    const payload = { 'Record ID': savedId };
    state.config.formFields.forEach(function(field) {
      payload[field.key] = document.getElementById(toInputId(field.key)).value;
    });
    google.script.run
      .withSuccessHandler(function(response) {
        loader.done();
        showToast(response.message || 'Record saved.', 'success');
        closeRecordModal();
        loadAppState(document.getElementById('searchInput').value.trim(), savedId || response.recordId || '');
        announce('Record saved successfully');
      })
      .withFailureHandler(function(err) { loader.done(); showError(err); })
      .saveRecord(payload, state.currentUser);
  }

  // --- Delete with custom confirm ---
  function confirmRemoveRecord(recordId, triggerEl) {
    if (!can('delete')) return showToast('This role cannot delete records.', 'error');
    openCustomConfirm({
      title: 'Delete record?',
      message: 'This will permanently remove this record and cannot be undone.',
      confirmText: 'Delete',
      trigger: triggerEl,
      onConfirm: function() {
        google.script.run
          .withSuccessHandler(function(response) {
            showToast(response.message || 'Record deleted.', 'success');
            loadAppState(document.getElementById('searchInput').value.trim());
            announce('Record deleted');
          })
          .withFailureHandler(showError)
          .deleteRecord(recordId, state.currentUser);
      }
    });
  }

  // --- Record Workspace ---
  function openRecordWorkspace(recordId) {
    state.selectedRecordId = recordId;
    openModal('detailModal');
    document.getElementById('summaryGrid').innerHTML = renderEmptyState('Loading…', '');
    document.getElementById('workflowButtons').innerHTML = '';
    document.getElementById('attachmentList').innerHTML = '';
    document.getElementById('recordTimeline').innerHTML = '';
    google.script.run
      .withSuccessHandler(function(bundle) {
        state.selectedBundle = bundle;
        renderRecordWorkspace(bundle);
      })
      .withFailureHandler(function(err) { closeDetailModal(); showError(err); })
      .getRecordBundle(recordId, state.currentUser);
  }

  function renderRecordWorkspace(bundle) {
    const record = bundle.record || {};
    document.getElementById('detailTitle').textContent = state.config.pageTitle + ' Workspace';
    document.getElementById('detailSubtitle').textContent = record['Record ID'] || '';
    const fields = state.config.summaryFields && state.config.summaryFields.length ? state.config.summaryFields : state.config.tableColumns;
    document.getElementById('summaryGrid').innerHTML = fields.map(function(field) {
      return '<div class="summary-card"><div class="summary-label">' + escapeHtml(field) + '</div><div class="summary-value">' + escapeHtml(record[field] == null ? '—' : String(record[field])) + '</div></div>';
    }).join('');
    document.getElementById('detailButtons').innerHTML =
      (can('edit') ? '<button class="btn btn-secondary btn-sm" type="button" onclick="editRecord(\'' + escapeAttr(record['Record ID']) + '\')">Edit Record</button>' : '') +
      (can('email') ? '<button class="btn btn-secondary btn-sm" type="button" onclick="openEmailModal()">Send Email</button>' : '') +
      (can('export') ? '<button class="btn btn-ghost btn-sm" type="button" onclick="openPrintableView()">Print / PDF</button>' : '');
    const wfBtns = document.getElementById('workflowButtons');
    if (bundle.quickActions && bundle.quickActions.length) {
      wfBtns.innerHTML = bundle.quickActions.map(function(action) {
        return '<button class="btn btn-primary btn-sm" type="button" onclick="runWorkflowAction(\'' + escapeAttr(action.key) + '\', this)">' + escapeHtml(action.label) + '</button>';
      }).join('');
    } else {
      wfBtns.innerHTML = renderEmptyState('No workflow actions available for this role.', '');
    }
    document.getElementById('attachmentList').innerHTML = (bundle.attachments && bundle.attachments.length)
      ? bundle.attachments.map(function(item) {
          return '<div class="mini-item"><div style="font-weight:700;font-size:14px">' + escapeHtml(item.fileName) + '</div>' +
            '<div class="muted" style="font-size:12px;margin-top:2px">' + escapeHtml(item.category) + ' · ' + escapeHtml(formatBytes(item.fileSize || 0)) + '</div>' +
            '<div class="timeline-meta">' + escapeHtml(item.uploadedBy || '') + ' · ' + escapeHtml(item.uploadedAt || '') + '</div>' +
            '<div style="margin-top:8px"><a href="' + escapeAttr(item.driveUrl) + '" target="_blank" rel="noopener">Open file ↗</a></div></div>';
        }).join('')
      : renderEmptyState('No attachments yet', 'Upload a file to attach it to this record.');
    document.getElementById('recordTimeline').innerHTML = (bundle.timeline && bundle.timeline.length)
      ? bundle.timeline.map(function(item) {
          return '<div class="timeline-item"><div class="timeline-title">' + escapeHtml(item.action) + '</div>' +
            '<div class="timeline-meta">' + escapeHtml(item.fullName || item.email || '') + ' · ' + escapeHtml(item.role || '') + ' · ' + escapeHtml(item.timestamp || '') + '</div></div>';
        }).join('')
      : renderEmptyState('No activity yet', 'Timeline entries will appear here.');
  }

  function closeDetailModal() {
    closeModal('detailModal');
    state.selectedRecordId = '';
    state.selectedBundle = null;
  }

  // --- Workflow (with loading state) ---
  function runWorkflowAction(actionKey, btn) {
    if (!can('workflow')) return showToast('This role cannot run workflow actions.', 'error');
    const note = document.getElementById('workflowNote').value.trim();
    const loader = btn ? withButtonLoading(btn, 'Processing') : null;
    google.script.run
      .withSuccessHandler(function(response) {
        if (loader) loader.done();
        showToast(response.message || 'Workflow updated.', 'success');
        openRecordWorkspace(state.selectedRecordId);
        loadAppState(document.getElementById('searchInput').value.trim());
        announce('Workflow action completed');
      })
      .withFailureHandler(function(err) { if (loader) loader.done(); showError(err); })
      .transitionRecord(state.selectedRecordId, actionKey, note, state.currentUser);
  }

  // --- Attachments ---
  function openAttachmentModal() {
    if (!can('upload')) return showToast('This role cannot upload attachments.', 'error');
    if (!state.selectedRecordId) return showToast('Open a record first.', 'error');
    openModal('attachmentModal');
  }

  function closeAttachmentModal() {
    closeModal('attachmentModal');
    document.getElementById('attachmentForm').reset();
  }

  function submitAttachment(event) {
    event.preventDefault();
    const fileInput = document.getElementById('attachmentFile');
    const file = fileInput.files && fileInput.files[0];
    if (!file) return showToast('Please choose a file.', 'error');
    if (file.size > 4 * 1024 * 1024) return showToast('File exceeds 4MB. Choose a smaller file.', 'error');
    const btn = document.getElementById('uploadBtn');
    const loader = withButtonLoading(btn, 'Uploading');
    const reader = new FileReader();
    reader.onload = function() {
      const base64Data = String(reader.result).split(',')[1];
      google.script.run
        .withSuccessHandler(function(response) {
          loader.done();
          showToast(response.message || 'Attachment uploaded.', 'success');
          closeAttachmentModal();
          openRecordWorkspace(state.selectedRecordId);
          loadAppState(document.getElementById('searchInput').value.trim());
        })
        .withFailureHandler(function(err) { loader.done(); showError(err); })
        .uploadAttachment({
          recordId: state.selectedRecordId, fileName: file.name, mimeType: file.type,
          base64Data: base64Data,
          category: document.getElementById('attachmentCategory').value,
          description: document.getElementById('attachmentDescription').value
        }, state.currentUser);
    };
    reader.readAsDataURL(file);
  }

  // --- Email ---
  function openEmailModal() {
    if (!can('email')) return showToast('This role cannot send notifications.', 'error');
    const record = state.selectedBundle && state.selectedBundle.record ? state.selectedBundle.record : null;
    if (!record) return showToast('Open a record first.', 'error');
    const template = (state.config.notificationTemplates || [])[0] || { subject: state.selectedRecordId + ' update' };
    document.getElementById('emailTo').value = guessEmailRecipient(record);
    document.getElementById('emailCc').value = '';
    document.getElementById('emailSubject').value = (template.subject || state.selectedRecordId + ' update').replace('{{recordId}}', state.selectedRecordId);
    document.getElementById('emailMessage').value = 'Hello,\n\nThis is a demo notification from ' + state.config.pageTitle + '.\n\nPlease review the latest update for record ' + state.selectedRecordId + '.';
    clearFormErrors(document.getElementById('emailForm'));
    openModal('emailModal');
  }

  function closeEmailModal() {
    closeModal('emailModal');
    document.getElementById('emailForm').reset();
    clearFormErrors(document.getElementById('emailForm'));
  }

  function submitEmail(event) {
    event.preventDefault();
    const form = document.getElementById('emailForm');
    if (!validateForm(form)) return;
    const btn = document.getElementById('sendEmailBtn');
    const loader = withButtonLoading(btn, 'Sending');
    google.script.run
      .withSuccessHandler(function(response) {
        loader.done();
        showToast(response.message || 'Email sent.', 'success');
        closeEmailModal();
        loadAppState(document.getElementById('searchInput').value.trim());
      })
      .withFailureHandler(function(err) { loader.done(); showError(err); })
      .sendRecordEmail({
        recordId: state.selectedRecordId,
        to: document.getElementById('emailTo').value.trim(),
        cc: document.getElementById('emailCc').value.trim(),
        subject: document.getElementById('emailSubject').value.trim(),
        message: document.getElementById('emailMessage').value.trim()
      }, state.currentUser);
  }

  function guessEmailRecipient(record) {
    const fields = ['Email','Contact','Requestor'];
    for (let i = 0; i < fields.length; i++) {
      const value = record && record[fields[i]] ? String(record[fields[i]]) : '';
      if (value.indexOf('@') > -1) return value;
    }
    return 'demo-recipient@example.com';
  }

  function openPrintableView() {
    if (!can('export')) return showToast('This role cannot export.', 'error');
    google.script.run
      .withSuccessHandler(function(url) {
        if (!url) return showToast('Deploy as web app first to enable print view.', 'error');
        window.open(url, '_blank');
      })
      .withFailureHandler(showError)
      .getPrintableUrl(state.selectedRecordId);
  }

  // --- Reset Demo ---
  function confirmResetDemoData() {
    if (!can('reset')) return showToast('Only Admin can reset demo data.', 'error');
    openCustomConfirm({
      title: 'Reset demo data?',
      message: 'This will clear all records and reload the demo dataset. This cannot be undone.',
      confirmText: 'Reset',
      onConfirm: function() {
        google.script.run
          .withSuccessHandler(function(response) {
            showToast(response.message || 'Demo reset complete.', 'success');
            loadAppState('');
          })
          .withFailureHandler(showError)
          .resetDemoData(state.currentUser);
      }
    });
  }

  // ============================================================
  // MODAL SYSTEM — focus-trapped, accessible
  // ============================================================
  function openModal(modalId) {
    const modal = document.getElementById(modalId);
    if (!modal) return;
    _modalStack.push({ id: modalId, prev: document.activeElement });
    modal.classList.remove('hidden');
    setTimeout(function() {
      const focusable = getFocusableEls(modal);
      if (focusable.length) focusable[0].focus();
    }, 50);
    modal.addEventListener('keydown', handleModalKeydown);
  }

  function closeModal(modalId) {
    const modal = document.getElementById(modalId);
    if (!modal) return;
    modal.classList.add('hidden');
    modal.removeEventListener('keydown', handleModalKeydown);
    for (let i = _modalStack.length - 1; i >= 0; i--) {
      if (_modalStack[i].id === modalId) {
        const entry = _modalStack.splice(i, 1)[0];
        if (entry.prev && typeof entry.prev.focus === 'function') {
          try { entry.prev.focus(); } catch (e) {}
        }
        break;
      }
    }
  }

  function handleModalKeydown(event) {
    const modal = event.currentTarget;
    if (event.key === 'Escape') {
      event.preventDefault();
      const id = modal.id;
      if (id === 'recordModal') closeRecordModal();
      else if (id === 'detailModal') closeDetailModal();
      else if (id === 'attachmentModal') closeAttachmentModal();
      else if (id === 'emailModal') closeEmailModal();
      else if (id === 'customConfirmModal') closeCustomConfirm();
      return;
    }
    if (event.key !== 'Tab') return;
    const focusable = getFocusableEls(modal);
    if (!focusable.length) return;
    const first = focusable[0];
    const last = focusable[focusable.length - 1];
    if (event.shiftKey && document.activeElement === first) {
      event.preventDefault(); last.focus();
    } else if (!event.shiftKey && document.activeElement === last) {
      event.preventDefault(); first.focus();
    }
  }

  function getFocusableEls(container) {
    return Array.from(container.querySelectorAll(
      'button:not(:disabled),[href],input:not(:disabled),select:not(:disabled),textarea:not(:disabled),[tabindex]:not([tabindex="-1"])'
    )).filter(function(el) {
      const s = window.getComputedStyle(el);
      return s.display !== 'none' && s.visibility !== 'hidden';
    });
  }

  // ============================================================
  // CUSTOM CONFIRM MODAL
  // ============================================================
  function openCustomConfirm(options) {
    _confirmAction = options.onConfirm || null;
    document.getElementById('confirmDialogTitle').textContent = options.title || 'Are you sure?';
    document.getElementById('confirmDialogMessage').textContent = options.message || 'This action cannot be undone.';
    document.getElementById('confirmSubmitBtn').textContent = options.confirmText || 'Confirm';
    openModal('customConfirmModal');
  }

  function closeCustomConfirm() {
    closeModal('customConfirmModal');
    _confirmAction = null;
  }

  function executeConfirmedAction() {
    const action = _confirmAction;
    closeCustomConfirm();
    if (action) action();
  }

  // ============================================================
  // FORM VALIDATION
  // ============================================================
  function validateForm(form) {
    let firstInvalid = null;
    form.querySelectorAll('[required]').forEach(function(input) {
      const wrap = input.parentElement;
      const existing = wrap.querySelector('.field-error');
      if (existing) existing.remove();
      input.classList.remove('field-invalid');
      if (!input.value.trim()) {
        input.classList.add('field-invalid');
        const err = document.createElement('span');
        err.className = 'field-error';
        err.setAttribute('role', 'alert');
        err.textContent = 'This field is required.';
        wrap.appendChild(err);
        if (!firstInvalid) firstInvalid = input;
      }
    });
    if (firstInvalid) { firstInvalid.focus(); return false; }
    return true;
  }

  function clearFormErrors(form) {
    if (!form) return;
    form.querySelectorAll('.field-invalid').forEach(function(el) { el.classList.remove('field-invalid'); });
    form.querySelectorAll('.field-error').forEach(function(el) { el.remove(); });
  }

  // ============================================================
  // BUTTON LOADING STATE
  // ============================================================
  function withButtonLoading(btn, label) {
    const original = btn.innerHTML;
    const w = btn.offsetWidth;
    btn.disabled = true;
    btn.style.minWidth = w + 'px';
    btn.innerHTML = '⏳ ' + label + '…';
    return {
      done: function() {
        btn.disabled = false;
        btn.innerHTML = original;
        btn.style.minWidth = '';
      }
    };
  }

  // ============================================================
  // TOAST NOTIFICATIONS
  // ============================================================
  function showToast(message, type) {
    type = type || 'info';
    const container = document.getElementById('toastContainer');
    const item = document.createElement('div');
    item.className = 'toast-item toast-' + type;
    item.textContent = message;
    container.appendChild(item);
    setTimeout(function() {
      item.classList.add('toast-fade');
      setTimeout(function() { if (item.parentNode) item.parentNode.removeChild(item); }, 350);
    }, 4000);
  }

  function showError(error) {
    const msg = (error && error.message) ? error.message : '';
    if (!msg) { showToast('Something went wrong. Please try again.', 'error'); return; }
    const low = msg.toLowerCase();
    if (low.indexOf('permission') > -1 || low.indexOf('authoriz') > -1 || low.indexOf('access denied') > -1) {
      showToast('You don\'t have permission for this action.', 'error');
    } else if (low.indexOf('network') > -1 || low.indexOf('connect') > -1 || low.indexOf('timeout') > -1) {
      showToast('Connection issue. Check your network and retry.', 'error');
    } else if (low.indexOf('validation') > -1 || low.indexOf('missing') > -1 || low.indexOf('required') > -1) {
      showToast('Please check required fields and try again.', 'error');
    } else {
      showToast(msg, 'error');
    }
  }

  // ============================================================
  // ARIA ANNOUNCER
  // ============================================================
  function announce(message) {
    const el = document.getElementById('ariaAnnouncer');
    if (!el) return;
    el.textContent = '';
    setTimeout(function() { el.textContent = message; }, 50);
  }

  // ============================================================
  // UTILITIES
  // ============================================================
  function toInputId(key) { return 'fld_' + key.replace(/[^a-zA-Z0-9]+/g, '_').toLowerCase(); }

  function escapeHtml(text) {
    return String(text == null ? '' : text)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function escapeAttr(text) { return escapeHtml(text); }

  function formatBytes(bytes) {
    const n = Number(bytes || 0);
    if (!n) return '0 B';
    if (n < 1024) return n + ' B';
    if (n < 1048576) return (n / 1024).toFixed(1) + ' KB';
    return (n / 1048576).toFixed(2) + ' MB';
  }
</script>
